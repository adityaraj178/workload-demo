apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app   # same name → conflict
  labels:
    app: my-app
    owner: app2
spec:
  replicas: 2   # different spec to show drift
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
        owner: app2
    spec:
      containers:
        - name: nginx
          image: nginx:latest
